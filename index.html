<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes Potenciales · Morelia y Tototlán</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar {
            width: 300px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 1000;
        }
        #sidebar h2 { 
            font-size: 20px; 
            margin-top: 0; 
            color: #2c3e50;
            font-weight: 600;
        }
        #sidebar p { font-size: 14px; color: #555; margin: 8px 0; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-m { 
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); 
            color: #333; 
        }
        .btn-m:hover { 
            background: linear-gradient(135deg, #FFC700 0%, #FF9500 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn-t { 
            background: linear-gradient(135deg, #C0C0C0 0%, #808080 100%); 
            color: #fff; 
        }
        .btn-t:hover { 
            background: linear-gradient(135deg, #B0B0B0 0%, #707070 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .btn-action {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-action:hover { 
            background: linear-gradient(135deg, #0056b3 0%, #004094 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn-clear { 
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); 
        }
        .btn-clear:hover { 
            background: linear-gradient(135deg, #c82333 0%, #b21f2d 100%);
        }

        /* Mapa */
        #map { flex: 1; height: 100%; }

        /* Iconos ancla mejorados */
        .ancla-marker {
            background: transparent !important;
            border: none !important;
        }

        /* Efecto de pulso para las anclas */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .ancla-marker svg {
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Mejorar los clusters de marcadores */
        .marker-cluster-small {
            background-color: rgba(181, 226, 140, 0.6);
        }
        .marker-cluster-small div {
            background-color: rgba(110, 204, 57, 0.8);
            color: white;
            font-weight: bold;
        }

        .marker-cluster-medium {
            background-color: rgba(241, 211, 87, 0.6);
        }
        .marker-cluster-medium div {
            background-color: rgba(240, 194, 12, 0.8);
            color: white;
            font-weight: bold;
        }

        .marker-cluster-large {
            background-color: rgba(253, 156, 115, 0.6);
        }
        .marker-cluster-large div {
            background-color: rgba(241, 128, 23, 0.8);
            color: white;
            font-weight: bold;
        }

        /* Iconos de clientes más discretos */
        .cliente-marker {
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <!-- Panel Lateral -->
    <div id="sidebar">
        <h2>📍 Clientes Potenciales</h2>
        <p><strong>Morelia y Tototlán</strong></p>
        <p id="contador-clientes" style="font-size: 16px; color: #2c3e50; font-weight: 600;">0 clientes | 0 en vista</p>
        <hr style="border: none; border-top: 2px solid #dee2e6; margin: 15px 0;">
        
        <p style="font-weight: 600; color: #2c3e50;">🎯 Filtrar por distancia:</p>
        <div class="btn-group">
            <button class="btn btn-m" id="btn-150-m">150 M.</button>
            <button class="btn btn-m" id="btn-190-m">190 M.</button>
            <button class="btn btn-t" id="btn-150-t">150 T.</button>
            <button class="btn btn-t" id="btn-190-t">190 T.</button>
        </div>

        <hr style="border: none; border-top: 2px solid #dee2e6; margin: 15px 0;">
        <button class="btn-action" id="btn-mi-ubicacion">📍 Mi ubicación</button>
        <button class="btn-action" id="btn-centrar-morelia">⭐ Centrar en Morelia</button>
        <button class="btn-action" id="btn-centrar-tototlan">⭐ Centrar en Tototlán</button>
        <button class="btn-action btn-clear" id="btn-limpiar">🧹 Limpiar filtros</button>
    </div>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <script>
        // ==========================================
        // 1. CONFIGURACIÓN INICIAL Y COORDENADAS
        // ==========================================
        const COORD_MORELIA = { lat: 19.70113, lng: -101.198219 };
        const COORD_TOTOTLAN = { lat: 20.53480, lng: -102.782470 };

        // Inicializar mapa
        const mapa = L.map('map').setView([COORD_MORELIA.lat, COORD_MORELIA.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);

        // ==========================================
        // 2. ICONOS ANCLA ELEGANTES (DISEÑO PREMIUM)
        // ==========================================
        function crearIconoAncla(colorPrincipal, colorSecundario, size) {
            return L.divIcon({
                className: 'ancla-marker',
                html: `
                    <svg width="${size}" height="${size * 1.3}" viewBox="0 0 50 65" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="grad_${colorPrincipal.replace('#', '')}" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:${colorPrincipal};stop-opacity:1" />
                                <stop offset="100%" style="stop-color:${colorSecundario};stop-opacity:1" />
                            </linearGradient>
                            <filter id="shadow">
                                <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
                            </filter>
                        </defs>
                        <!-- Pin principal -->
                        <path d="M 25 0 C 11.2 0 0 11.2 0 25 C 0 42.5 25 65 25 65 C 25 65 50 42.5 50 25 C 50 11.2 38.8 0 25 0 Z" 
                              fill="url(#grad_${colorPrincipal.replace('#', '')})" 
                              filter="url(#shadow)"/>
                        <!-- Círculo interior -->
                        <circle cx="25" cy="25" r="18" fill="white" opacity="0.95"/>
                        <!-- Estrella central -->
                        <polygon points="25,12 28.5,20.5 37.5,21.5 31,27.5 32.5,36.5 25,32 17.5,36.5 19,27.5 12.5,21.5 21.5,20.5" 
                                 fill="url(#grad_${colorPrincipal.replace('#', '')})" 
                                 stroke="${colorSecundario}" 
                                 stroke-width="0.5"/>
                    </svg>
                `,
                iconSize: [size, size * 1.3],
                iconAnchor: [size / 2, size * 1.3],
                popupAnchor: [0, -size * 1.3]
            });
        }

        // Marcadores de las sedes (Iconos premium de 45px)
        const marcadorMorelia = L.marker([COORD_MORELIA.lat, COORD_MORELIA.lng], {
            icon: crearIconoAncla('#FFD700', '#FF8C00', 45) // Dorado con gradiente
        }).addTo(mapa).bindPopup('<b style="font-size: 16px;">⭐ Morelia</b><br>Centro de operación principal');

        const marcadorTototlan = L.marker([COORD_TOTOTLAN.lat, COORD_TOTOTLAN.lng], {
            icon: crearIconoAncla('#4169E1', '#1E90FF', 45) // Azul royal con gradiente
        }).addTo(mapa).bindPopup('<b style="font-size: 16px;">⭐ Tototlán</b><br>Centro de operación');

        // ==========================================
        // 3. CLUSTER DE CLIENTES (AGRUPAMIENTO)
        // ==========================================
        // Crear grupo de clusters
        const clientesCluster = L.markerClusterGroup({
            maxClusterRadius: 50, // Radio para agrupar (en pixels)
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            disableClusteringAtZoom: 17 // Desactivar clustering en zoom muy cercano
        });

        const clientesMarkers = [];
        let circuloFiltro = null;

        // Icono de cliente más discreto
        function crearIconoCliente() {
            return L.divIcon({
                className: 'cliente-marker',
                html: `
                    <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="10" cy="10" r="8" fill="#3498db" stroke="white" stroke-width="2" opacity="0.85"/>
                        <circle cx="10" cy="10" r="3" fill="white"/>
                    </svg>
                `,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
        }

        function generarClientesFicticios(centro, cantidad, radioMax) {
            for (let i = 0; i < cantidad; i++) {
                const angulo = Math.random() * 2 * Math.PI;
                const distancia = Math.random() * radioMax;
                const deltaLat = (distancia / 111320) * Math.cos(angulo);
                const deltaLng = (distancia / (111320 * Math.cos(centro.lat * Math.PI / 180))) * Math.sin(angulo);
                
                const lat = centro.lat + deltaLat;
                const lng = centro.lng + deltaLng;

                const marker = L.marker([lat, lng], {
                    icon: crearIconoCliente()
                }).bindPopup(`
                    <div style="text-align: center; padding: 5px;">
                        <b style="color: #2c3e50; font-size: 14px;">Cliente #${clientesMarkers.length + 1}</b><br>
                        <span style="color: #7f8c8d; font-size: 12px;">Distancia: ${Math.round(distancia)}m</span>
                    </div>
                `);
                
                clientesMarkers.push(marker);
                clientesCluster.addLayer(marker);
            }
        }

        // Generar clientes
        generarClientesFicticios(COORD_MORELIA, 50, 400);
        generarClientesFicticios(COORD_TOTOTLAN, 50, 400);

        // Agregar cluster al mapa
        mapa.addLayer(clientesCluster);
        actualizarContador();

        // ==========================================
        // 4. LÓGICA DE FILTRADO
        // ==========================================
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function filtrarClientesPorDistancia(coordCentro, radioMetros) {
            let clientesEnVista = 0;
            
            // Limpiar cluster actual
            mapa.removeLayer(clientesCluster);
            
            // Crear nuevo cluster temporal para el filtro
            const clusterFiltro = L.markerClusterGroup({
                maxClusterRadius: 50,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                zoomToBoundsOnClick: true,
                disableClusteringAtZoom: 17
            });

            // Filtrar y agregar solo los clientes dentro del radio
            clientesMarkers.forEach(marker => {
                const pos = marker.getLatLng();
                const distancia = calcularDistancia(coordCentro.lat, coordCentro.lng, pos.lat, pos.lng);
                
                if (distancia <= radioMetros) {
                    clusterFiltro.addLayer(marker);
                    clientesEnVista++;
                }
            });

            // Agregar cluster filtrado al mapa
            mapa.addLayer(clusterFiltro);

            // Dibujar círculo visual
            if (circuloFiltro) mapa.removeLayer(circuloFiltro);
            circuloFiltro = L.circle([coordCentro.lat, coordCentro.lng], {
                radius: radioMetros,
                color: '#e74c3c',
                fillColor: '#e74c3c',
                fillOpacity: 0.1,
                weight: 3,
                dashArray: '8, 8'
            }).addTo(mapa);

            // Centrar mapa
            mapa.setView([coordCentro.lat, coordCentro.lng], 16);

            // Actualizar UI
            actualizarContador(clientesEnVista);

            // Guardar referencia para limpiar
            clientesCluster._clusterFiltro = clusterFiltro;
        }

        function limpiarFiltros() {
            // Remover cluster de filtro si existe
            if (clientesCluster._clusterFiltro) {
                mapa.removeLayer(clientesCluster._clusterFiltro);
            }
            
            // Mostrar cluster original con todos los clientes
            if (!mapa.hasLayer(clientesCluster)) {
                mapa.addLayer(clientesCluster);
            }

            // Quitar círculo
            if (circuloFiltro) {
                mapa.removeLayer(circuloFiltro);
                circuloFiltro = null;
            }
            
            actualizarContador();
            mapa.setView([COORD_MORELIA.lat, COORD_MORELIA.lng], 13);
        }

        function actualizarContador(enVista = null) {
            const total = clientesMarkers.length;
            const vista = enVista !== null ? enVista : total;
            document.getElementById('contador-clientes').innerText = `${total} clientes | ${vista} en vista`;
        }

        // ==========================================
        // 5. EVENTOS DE LOS BOTONES
        // ==========================================
        document.getElementById('btn-150-m').addEventListener('click', () => filtrarClientesPorDistancia(COORD_MORELIA, 150));
        document.getElementById('btn-190-m').addEventListener('click', () => filtrarClientesPorDistancia(COORD_MORELIA, 190));
        
        document.getElementById('btn-150-t').addEventListener('click', () => filtrarClientesPorDistancia(COORD_TOTOTLAN, 150));
        document.getElementById('btn-190-t').addEventListener('click', () => filtrarClientesPorDistancia(COORD_TOTOTLAN, 190));

        document.getElementById('btn-centrar-morelia').addEventListener('click', () => mapa.setView([COORD_MORELIA.lat, COORD_MORELIA.lng], 15));
        document.getElementById('btn-centrar-tototlan').addEventListener('click', () => mapa.setView([COORD_TOTOTLAN.lat, COORD_TOTOTLAN.lng], 15));
        
        document.getElementById('btn-limpiar').addEventListener('click', limpiarFiltros);

        document.getElementById('btn-mi-ubicacion').addEventListener('click', () => {
            mapa.locate({setView: true, maxZoom: 16});
        });

    </script>
</body>
</html>
