<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes Potenciales · Morelia y Tototlán</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar {
            width: 300px;
            background: #f8f9fa;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 1000;
        }
        #sidebar h2 { font-size: 18px; margin-top: 0; color: #333; }
        #sidebar p { font-size: 14px; color: #666; margin: 5px 0; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-m { background: #FFD700; color: #333; } /* Dorado para Morelia */
        .btn-m:hover { background: #e6c200; }
        .btn-t { background: #C0C0C0; color: #333; } /* Plateado para Tototlán */
        .btn-t:hover { background: #a9a9a9; }
        
        .btn-action {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-action:hover { background: #0056b3; }
        .btn-clear { background: #dc3545; }
        .btn-clear:hover { background: #c82333; }

        /* Mapa */
        #map { flex: 1; height: 100%; }

        /* Estilos para las estrellas */
        .estrella-marker {
            background: transparent !important;
            border: none !important;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
            transition: transform 0.2s;
        }
        .estrella-marker:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <!-- Panel Lateral (Basado en tu interfaz) -->
    <div id="sidebar">
        <h2>Clientes Potenciales · GNU</h2>
        <p><strong>Morelia y Tototlán</strong></p>
        <p id="contador-clientes">0 clientes | 0 en vista</p>
        <hr>
        
        <p><strong>Filtrar por distancia:</strong></p>
        <div class="btn-group">
            <button class="btn btn-m" id="btn-150-m">150 M.</button>
            <button class="btn btn-m" id="btn-190-m">190 M.</button>
            <button class="btn btn-t" id="btn-150-t">150 T.</button>
            <button class="btn btn-t" id="btn-190-t">190 T.</button>
        </div>

        <hr>
        <button class="btn-action" id="btn-mi-ubicacion">Mi ubicación</button>
        <button class="btn-action" id="btn-centrar-morelia">Centrar en Morelia</button>
        <button class="btn-action" id="btn-centrar-tototlan">Centrar en Tototlán</button>
        <button class="btn-action btn-clear" id="btn-limpiar">Limpiar filtros</button>
    </div>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ==========================================
        // 1. CONFIGURACIÓN INICIAL Y COORDENADAS
        // ==========================================
        const COORD_MORELIA = { lat: 19.70113, lng: -101.198219 };
        const COORD_TOTOTLAN = { lat: 20.53480, lng: -102.782470 };

        // Inicializar mapa
        const mapa = L.map('map').setView([COORD_MORELIA.lat, COORD_MORELIA.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);

        // ==========================================
        // 2. ICONOS PERSONALIZADOS (ESTRELLAS GRANDES)
        // ==========================================
        function crearIconoEstrella(color, size) {
            return L.divIcon({
                className: 'estrella-marker',
                html: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}" stroke="#333" stroke-width="1.5">
                        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                       </svg>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -size / 2]
            });
        }

        // Marcadores de las sedes (Estrellas de 50px)
        const marcadorMorelia = L.marker([COORD_MORELIA.lat, COORD_MORELIA.lng], {
            icon: crearIconoEstrella('#FFD700', 50) // Estrella Dorada Grande
        }).addTo(mapa).bindPopup('<b>Morelia</b><br>Centro de operación');

        const marcadorTototlan = L.marker([COORD_TOTOTLAN.lat, COORD_TOTOTLAN.lng], {
            icon: crearIconoEstrella('#C0C0C0', 50) // Estrella Plateada Grande
        }).addTo(mapa).bindPopup('<b>Tototlán</b><br>Centro de operación');

        // ==========================================
        // 3. DATOS DE EJEMPLO (CLIENTES)
        // ==========================================
        // Generamos clientes ficticios alrededor de ambas coordenadas para probar los filtros
        const clientesMarkers = [];
        let circuloFiltro = null;

        function generarClientesFicticios(centro, cantidad, radioMax) {
            for (let i = 0; i < cantidad; i++) {
                // Generar coordenadas aleatorias dentro de un radio
                const angulo = Math.random() * 2 * Math.PI;
                const distancia = Math.random() * radioMax;
                const deltaLat = (distancia / 111320) * Math.cos(angulo);
                const deltaLng = (distancia / (111320 * Math.cos(centro.lat * Math.PI / 180))) * Math.sin(angulo);
                
                const lat = centro.lat + deltaLat;
                const lng = centro.lng + deltaLng;

                const marker = L.marker([lat, lng]).bindPopup(`Cliente #${clientesMarkers.length + 1}<br>Distancia aprox: ${Math.round(distancia)}m`);
                clientesMarkers.push(marker);
            }
        }

        // Generar 30 clientes alrededor de Morelia (hasta 300m de distancia)
        generarClientesFicticios(COORD_MORELIA, 30, 300);
        // Generar 30 clientes alrededor de Tototlán (hasta 300m de distancia)
        generarClientesFicticios(COORD_TOTOTLAN, 30, 300);

        // Mostrar todos al inicio
        clientesMarkers.forEach(m => m.addTo(mapa));
        actualizarContador();

        // ==========================================
        // 4. LÓGICA DE FILTRADO (FÓRMULA DE Haversine)
        // ==========================================
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Radio de la tierra en metros
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function filtrarClientesPorDistancia(coordCentro, radioMetros) {
            let clientesEnVista = 0;
            
            // 1. Filtrar marcadores
            clientesMarkers.forEach(marker => {
                const pos = marker.getLatLng();
                const distancia = calcularDistancia(coordCentro.lat, coordCentro.lng, pos.lat, pos.lng);
                
                if (distancia <= radioMetros) {
                    if (!mapa.hasLayer(marker)) mapa.addLayer(marker);
                    clientesEnVista++;
                } else {
                    if (mapa.hasLayer(marker)) mapa.removeLayer(marker);
                }
            });

            // 2. Dibujar círculo visual
            if (circuloFiltro) mapa.removeLayer(circuloFiltro);
            circuloFiltro = L.circle([coordCentro.lat, coordCentro.lng], {
                radius: radioMetros,
                color: '#ff6600',
                fillColor: '#ff6600',
                fillOpacity: 0.15,
                weight: 2,
                dashArray: '5, 10'
            }).addTo(mapa);

            // 3. Centrar mapa en la coordenada clave
            mapa.setView([coordCentro.lat, coordCentro.lng], 17); // Zoom 17 para ver bien los metros

            // 4. Actualizar UI
            actualizarContador(clientesEnVista);
        }

        function limpiarFiltros() {
            // Mostrar todos los clientes
            clientesMarkers.forEach(marker => {
                if (!mapa.hasLayer(marker)) mapa.addLayer(marker);
            });
            // Quitar círculo
            if (circuloFiltro) {
                mapa.removeLayer(circuloFiltro);
                circuloFiltro = null;
            }
            actualizarContador();
            mapa.setView([COORD_MORELIA.lat, COORD_MORELIA.lng], 13);
        }

        function actualizarContador(enVista = null) {
            const total = clientesMarkers.length;
            const vista = enVista !== null ? enVista : total;
            document.getElementById('contador-clientes').innerText = `${total} clientes | ${vista} en vista`;
        }

        // ==========================================
        // 5. EVENTOS DE LOS BOTONES
        // ==========================================
        document.getElementById('btn-150-m').addEventListener('click', () => filtrarClientesPorDistancia(COORD_MORELIA, 150));
        document.getElementById('btn-190-m').addEventListener('click', () => filtrarClientesPorDistancia(COORD_MORELIA, 190));
        
        document.getElementById('btn-150-t').addEventListener('click', () => filtrarClientesPorDistancia(COORD_TOTOTLAN, 150));
        document.getElementById('btn-190-t').addEventListener('click', () => filtrarClientesPorDistancia(COORD_TOTOTLAN, 190));

        document.getElementById('btn-centrar-morelia').addEventListener('click', () => mapa.setView([COORD_MORELIA.lat, COORD_MORELIA.lng], 15));
        document.getElementById('btn-centrar-tototlan').addEventListener('click', () => mapa.setView([COORD_TOTOTLAN.lat, COORD_TOTOTLAN.lng], 15));
        
        document.getElementById('btn-limpiar').addEventListener('click', limpiarFiltros);

        document.getElementById('btn-mi-ubicacion').addEventListener('click', () => {
            mapa.locate({setView: true, maxZoom: 16});
        });

    </script>
</body>
</html>
