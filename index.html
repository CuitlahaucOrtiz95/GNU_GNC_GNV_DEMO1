<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1F5CA9" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231F5CA9'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial'%3E%F0%9F%93%8D%3C/text%3E%3C/svg%3E" />
  <title>Clientes Potenciales · Morelia y Tototlán</title>
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://a.basemaps.cartocdn.com" />
  <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />
  <link rel="dns-prefetch" href="https://router.project-osrm.org" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script defer src="ClientesPotenciales.js"></script>
  <style>
    :root {
      --primary: #1F5CA9;
      --primary-hover: #17497f;
      --secondary: #27BFF0;
      --bg-app: #f1f5f9;
      --bg-surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --border-hover: #cbd5e1;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-full: 999px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    :root[data-theme="dark"] {
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --secondary: #38bdf8;
      --bg-app: #0f172a;
      --bg-surface: #1e293b;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #334155;
      --border-hover: #475569;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      height: 100vh; height: 100dvh;
      overflow: hidden;
      transition: background .3s, color .3s;
    }
    .app {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
    }

    /* SIDEBAR */
    .sidebar {
      width: 340px;
      min-width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 20;
      box-shadow: var(--shadow-md);
      transition: transform 0.35s ease, width 0.35s ease;
      position: relative;
    }
    .sidebar.collapsed {
      transform: translateX(-100%);
      width: 0;
      min-width: 0;
      border: none;
    }
    .sidebar-header {
      padding: 20px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .close-sidebar {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-secondary);
      cursor: pointer;
      display: none;
    }
    .search-box {
      padding: 15px 20px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      background: var(--bg-app);
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
    }
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(31,92,169,0.15);
    }
    .search-box i {
      position: absolute;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }
    .filters-area {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .filters-area select, .filter-btn {
      padding: 8px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      background: var(--bg-surface);
      color: var(--text-primary);
      cursor: pointer;
    }
    .directory-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }
    .directory-list .item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .directory-list .item:hover { background: var(--bg-app); }
    .directory-list .item .name { font-weight: 600; font-size: 0.9rem; }
    .directory-list .item .meta { color: var(--text-secondary); font-size: 0.75rem; }
    .sort-tabs {
      display: flex;
      gap: 5px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sort-tabs button {
      background: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .sort-tabs button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* MAP AREA */
    .map-container {
      flex: 1;
      position: relative;
      background: var(--bg-app);
    }
    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* FLOATING TOOLBAR */
    .floating-toolbar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
      background: var(--bg-surface);
      padding: 10px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.8);
    }
    :root[data-theme="dark"] .floating-toolbar {
      background: rgba(30,41,59,0.85);
    }
    .floating-toolbar button, .floating-toolbar .tool-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      position: relative;
    }
    .floating-toolbar button:hover, .tool-btn:hover {
      background: var(--bg-app);
      transform: scale(1.05);
    }
    .tool-btn.active { background: var(--primary); color: #fff; }
    .tooltip {
      visibility: hidden;
      background: var(--text-primary);
      color: var(--bg-surface);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 6px;
      position: absolute;
      right: 50px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .floating-toolbar button:hover .tooltip, .tool-btn:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }

    /* TOP BAR */
    .topbar {
      position: absolute;
      top: 20px;
      left: 360px;
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--bg-surface);
      padding: 8px 20px;
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-md);
      transition: left 0.35s ease;
    }
    .sidebar.collapsed ~ .map-container .topbar {
      left: 20px;
    }
    .anchor-pills {
      display: flex;
      gap: 8px;
    }
    .anchor-pill {
      padding: 8px 20px;
      border-radius: var(--radius-full);
      border: none;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    .anchor-pill.morelia { background: #004D99; }
    .anchor-pill.morelia:hover { background: #003b77; }
    .anchor-pill.tototlan { background: #FF6B35; }
    .anchor-pill.tototlan:hover { background: #e65a00; }
    .stats-badge {
      display: flex;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    /* TOGGLE SIDEBAR BUTTON */
    .sidebar-toggle {
      position: absolute;
      left: 350px;
      top: 20px;
      z-index: 25;
      background: var(--bg-surface);
      border: none;
      box-shadow: var(--shadow-md);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: left 0.35s ease;
      color: var(--text-primary);
    }
    .sidebar.collapsed ~ .sidebar-toggle {
      left: 20px;
    }

    /* MOBILE ADAPTATIONS */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        width: 85%;
        max-width: 320px;
        transform: translateX(0);
        z-index: 30;
      }
      .sidebar.collapsed {
        transform: translateX(-100%);
        width: 85%;
        min-width: auto;
      }
      .close-sidebar { display: block; }
      .sidebar-toggle { left: 20px; }
      .topbar {
        left: 20px;
        right: 20px;
        justify-content: space-between;
      }
      .floating-toolbar {
        bottom: 20px;
        top: auto;
        right: 10px;
        flex-direction: row;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-users"></i> Directorio</h2>
      <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar cliente…" autocomplete="off" />
      <div class="search-suggestions" id="searchSuggestions" style="display:none; position:absolute; top:100%; left:20px; right:20px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); z-index:30; max-height:200px; overflow-y:auto;"></div>
    </div>
    <div class="filters-area">
      <select id="tamanoFilter">
        <option value="all">Todos los tamaños</option>
      </select>
      <div style="display:flex; align-items:center; gap:5px;">
        <label style="font-size:0.75rem;">Dist. máx</label>
        <input type="range" id="distSlider" min="60" max="190" value="190" style="width:80px;" />
        <span id="distLabel" style="font-size:0.7rem; font-weight:600;">190 km</span>
      </div>
    </div>
    <div class="sort-tabs" id="sortTabs">
      <button id="sortDist" class="active" data-sort="dist">📏 Distancia</button>
      <button id="sortState" data-sort="state">📌 Estado</button>
      <button id="sortName" data-sort="name">🔤 A-Z</button>
    </div>
    <div class="directory-list" id="list"></div>
  </div>

  <!-- Sidebar toggle button -->
  <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-chevron-right"></i></button>

  <!-- Map container -->
  <div class="map-container">
    <div id="map"></div>
    <!-- Floating toolbar -->
    <div class="floating-toolbar">
      <button id="circulosToggleBtn"><i class="fas fa-bullseye"></i><span class="tooltip">Círculos de radio</span></button>
      <button id="geocodeBtn"><i class="fas fa-address-card"></i><span class="tooltip">Geocodificar</span></button>
      <button id="noAddressBtn"><i class="fas fa-envelope"></i><span class="tooltip">Sin dirección</span></button>
      <button id="addClientBtn"><i class="fas fa-plus-circle"></i><span class="tooltip">Agregar cliente</span></button>
      <button id="exportCsvBtn"><i class="fas fa-file-csv"></i><span class="tooltip">Exportar CSV</span></button>
      <button id="clearRouteBtn"><i class="fas fa-route"></i><span class="tooltip">Limpiar ruta</span></button>
      <button id="gotoClosestBtn"><i class="fas fa-bullseye"></i><span class="tooltip">Más cercano</span></button>
      <button id="resetBtn"><i class="fas fa-home"></i><span class="tooltip">Restablecer vista</span></button>
    </div>
    <!-- Topbar -->
    <div class="topbar">
      <div class="anchor-pills">
        <button class="anchor-pill morelia" id="centerMoreliaBtn"><i class="fas fa-star"></i> Morelia</button>
        <button class="anchor-pill tototlan" id="centerTototlanBtn"><i class="fas fa-star"></i> Tototlán</button>
      </div>
      <div class="stats-badge">
        <span><span id="rTotal">0</span> total</span>
        <span><span id="rMatch">0</span> visibles</span>
      </div>
      <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</div>

<!-- Modales y otros elementos ocultos (se mantienen igual) -->
